name: Test

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6
            - name: Use Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: 22
                  cache: 'pnpm'
            - run: pnpm install --frozen-lockfile
            - run: pnpm test
